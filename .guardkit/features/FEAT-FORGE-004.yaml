id: FEAT-FORGE-004
name: Confidence-Gated Checkpoint Protocol
description: 'Confidence-gated checkpoint protocol for Forge: four gate modes (auto-approve
  / flag-for-review / hard-stop / mandatory human approval) driven by reasoning-model
  emergent gating (ADR-ARCH-019), two-layer constitutional override on PR-review/PR-create
  (ADR-ARCH-026 belt-and-braces), NATS approval round-trip with first-response-wins
  idempotency, forge cancel/skip CLI steering, DDR-002 resume-value rehydration, SQLite-first
  durable recording, crash-recovery re-emission.'
